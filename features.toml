schema = "sim.features"

[enforcement.audience]
framework = "strict"
code = "strict"

[enforcement.specimen]
user = "strict"
framework = "strict"
code = "advisory"

[enforcement.route]
major_entrypoints = "advisory"
frameworks = "advisory"

[[feature]]
id = "feature/sim-runtime/incremental-query-core"
title = "Incremental query core"
summary = "Provide the generic memo graph algorithm that runtime organs can wrap without depending on SIM value surfaces."
owner = "crate/sim-incremental-core"
audiences = ["code"]
guidance = "Use this row when maintaining the dependency-light incremental calculation core. SIM value conversion and runtime loading are owned by the incremental query organ."
claims_anchors = [
  "anchor/crate/sim-incremental-core",
]
claims_specimens = [
  "spec-test/sim-runtime/crates/sim-incremental-core/src/tests",
]
supports = [
  "feature/sim-runtime/incremental-query-organ",
  "feature/sim-runtime/organs",
]

[[feature]]
id = "feature/sim-runtime/incremental-query-organ"
title = "Incremental query organ"
summary = "Expose incremental expression queries as a loadable SIM organ with capability-gated registration, invalidation, verification, explanation, snapshots, and metrics."
owner = "crate/sim-lib-incremental"
audiences = ["code", "framework"]
guidance = "Use this row when a framework needs memoized expression calculation that is loadable, browseable, and callable through the SIM runtime."
claims_anchors = [
  "anchor/crate/sim-lib-incremental",
  "anchor/runtime-lib/sim-lib-incremental/incremental-lib",
  "anchor/card/cookbook/organ/incremental",
]
claims_specimens = [
  "spec-test/sim-runtime/crates/sim-lib-incremental/src/tests",
]
supports = [
  "feature/sim-runtime/organs",
]

[[feature]]
id = "feature/sim-runtime/capabilities-read-eval"
title = "Capabilities and read-eval"
summary = "Gate diminished read-eval and surface packing through explicit runtime libraries and capability checks."
owner = "crate/sim-lib-core"
audiences = ["code", "framework"]
guidance = "Use this row when a framework needs diminished evaluation, read policy, or capability-gated loading."
claims_anchors = [
  "anchor/crate/sim-lib-core",
  "anchor/runtime-lib/sim-lib-core/read-eval-broker-lib",
  "anchor/runtime-lib/sim-lib-core/surface-pack-lib",
]
claims_specimens = [
  "spec-test/sim-runtime/crates/sim-lib-standard-core/src/read_construct",
]

