[[route]]
id = "route/add-capability-gated-read-eval"
task = "Add capability-gated read-eval"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-runtime/capabilities-read-eval", why = "The core row owns read policy, capability checks, and read-construct evidence." },
  { specimen = "spec-test/sim-runtime/crates/sim-lib-standard-core/src/read_construct", why = "The read-construct test checks object round trips through standard core." },
]

[[route]]
id = "route/add-runtime-organ"
task = "Add a runtime organ"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-runtime/organs", why = "The organ row groups reusable binding, control, logic, pattern, incremental, mutation, namespace, and sequence behavior." },
  { feature = "feature/sim-runtime/contract-emitter", why = "The emitter row keeps generated runtime contract evidence current." },
]

[[route]]
id = "route/add-incremental-query-organ"
task = "Add an incremental query organ"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-runtime/incremental-query-core", why = "The core row owns the dependency-light memo graph and cutoff algorithm." },
  { feature = "feature/sim-runtime/incremental-query-organ", why = "The organ row owns SIM conversion, capability gates, shapes, reports, and loadable exports." },
  { specimen = "spec-test/sim-runtime/crates/sim-lib-incremental/src/tests", why = "The checked tests exercise registration, invalidation, verification, cutoff, reports, and Card projection." },
]

[[route]]
id = "route/load-runtime-library"
task = "Load a runtime library"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-runtime/library-loading", why = "The loading row owns standard and language-profile runtime libraries." },
]

[[route]]
id = "route/add-host-exec-primitive"
task = "Add a host exec primitive"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-runtime/host-exec", why = "The exec row keeps host process behavior in a loadable library." },
]
