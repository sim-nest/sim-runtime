# GitHub Actions CI for this crate.
name: ci
on:
  pull_request: {}
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SIMDOC_TOOLING_MANIFEST: ${{ github.workspace }}/sim-tooling/Cargo.toml
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/checkout@v4
        with:
          repository: sim-nest/sim-tooling
          path: sim-tooling
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo run -p xtask -- check-local-sources
      - run: cargo run -p xtask -- check-file-sizes
      - run: cargo test -p sim-lib-standard-core --features native-export
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo run -p xtask -- simdoc --check
      - run: cargo run -p xtask -- repo-contract --check --repo .
      - run: cargo run -p xtask -- validation-matrix --check --repo .
      - run: cargo run -p xtask -- crate-catalog --check --repo .
